<svg width="960" height="300" viewBox="0 0 960 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Usage status mapping</title>
  <desc id="desc">Five usage states shown as compact capsules.</desc>
  <rect width="960" height="300" rx="28" fill="#f7faf8"/>
  <text x="48" y="62" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#17211f">状态映射 / Status Mapping</text>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="800">
    <g transform="translate(48 104)">
      <rect width="150" height="46" rx="23" fill="#10211f" opacity="0.78"/>
      <text x="20" y="28" fill="#35db6b">满电</text>
      <text x="92" y="28" fill="#fff">90%</text>
      <text x="0" y="78" font-size="15" fill="#445" font-weight="600">60-100%</text>
    </g>
    <g transform="translate(222 104)">
      <rect width="150" height="46" rx="23" fill="#10211f" opacity="0.78"/>
      <text x="20" y="28" fill="#23c8b5">稳定</text>
      <text x="92" y="28" fill="#fff">45%</text>
      <text x="0" y="78" font-size="15" fill="#445" font-weight="600">30-59%</text>
    </g>
    <g transform="translate(396 104)">
      <rect width="150" height="46" rx="23" fill="#10211f" opacity="0.78"/>
      <text x="20" y="28" fill="#ffd33d">省用</text>
      <text x="92" y="28" fill="#fff">22%</text>
      <text x="0" y="78" font-size="15" fill="#445" font-weight="600">10-29%</text>
    </g>
    <g transform="translate(570 104)">
      <rect width="150" height="46" rx="23" fill="#10211f" opacity="0.78"/>
      <text x="20" y="28" fill="#ff9f1c">低电</text>
      <text x="92" y="28" fill="#fff">7%</text>
      <text x="0" y="78" font-size="15" fill="#445" font-weight="600">1-9%</text>
    </g>
    <g transform="translate(744 104)">
      <rect width="150" height="46" rx="23" fill="#10211f" opacity="0.78"/>
      <text x="20" y="28" fill="#ff5a5f">休息</text>
      <text x="92" y="28" fill="#fff">0%</text>
      <text x="0" y="78" font-size="15" fill="#445" font-weight="600">0% / limited</text>
    </g>
  </g>
  <text x="48" y="248" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#5b6662">The plugin uses the tightest active Codex usage window as the displayed state.</text>
</svg>
