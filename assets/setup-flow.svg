<svg width="960" height="300" viewBox="0 0 960 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Setup flow</title>
  <desc id="desc">Build, start, and launch at login steps.</desc>
  <rect width="960" height="300" rx="28" fill="#101817"/>
  <text x="48" y="62" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="800" fill="#fff">安装流程 / Setup Flow</text>
  <g font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700">
    <g transform="translate(48 100)">
      <rect width="240" height="98" rx="14" fill="#1c2a28"/>
      <text x="24" y="38" fill="#35db6b">1. Build</text>
      <text x="24" y="72" fill="#d7fff0">./build.sh</text>
    </g>
    <path d="M310 149 L374 149" stroke="#35db6b" stroke-width="5" stroke-linecap="round"/>
    <path d="M374 149 L360 137 M374 149 L360 161" stroke="#35db6b" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(396 100)">
      <rect width="240" height="98" rx="14" fill="#1c2a28"/>
      <text x="24" y="38" fill="#35db6b">2. Start</text>
      <text x="24" y="72" fill="#d7fff0">./start-overlay.sh</text>
    </g>
    <path d="M658 149 L722 149" stroke="#35db6b" stroke-width="5" stroke-linecap="round"/>
    <path d="M722 149 L708 137 M722 149 L708 161" stroke="#35db6b" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(744 100)">
      <rect width="240" height="98" rx="14" fill="#1c2a28"/>
      <text x="24" y="38" fill="#35db6b">3. Optional</text>
      <text x="24" y="72" fill="#d7fff0">./install-launch-agent.sh</text>
    </g>
  </g>
  <text x="48" y="250" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#a7bbb5">Build locally, start the overlay, then optionally enable launch at login.</text>
</svg>
